services:
  matrix-assistant-bot:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: matrix-assistant-bot
    restart: unless-stopped
    env_file:
      - .env
    environment:
      BOT_DATA_DIR: /data
    volumes:
      - bot-data:/data
    extra_hosts:
      - "host.docker.internal:host-gateway"

volumes:
  bot-data:

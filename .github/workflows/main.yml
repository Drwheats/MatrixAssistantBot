name: MacBook Auto Deploy

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: self-hosted

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Path and Install
        run: |
          # Add common Mac Homebrew and Local paths to the Runner's PATH
          export PATH=$PATH:/usr/local/bin:/opt/homebrew/bin
          
          echo "Checking versions..."
          node -v
          npm -v
          
          npm install

      - name: Deploy/Restart Server
        run: |
          # Add path here too so it can find PM2
          export PATH=$PATH:/usr/local/bin:/opt/homebrew/bin
          
          pm2 restart my-cool-app || pm2 start index.js --name "my-cool-app"
          pm2 save

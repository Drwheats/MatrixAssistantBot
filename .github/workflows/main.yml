name: MacBook Auto Deploy

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: self-hosted

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Build and Deploy
        run: |
          # 1. Ensure the Runner can find Node/NPM/PM2
          export PATH=$PATH:/usr/local/bin:/opt/homebrew/bin
          
          # 2. Install dependencies (cleanly)
          npm install
          
          # 3. Build your application
          npm run build
          
          # 4. Restart the server with PM2
          # We tell PM2 to run 'npm start' and name it 'my-app'
          pm2 restart my-app || pm2 start npm --name "my-app" -- start
          
          # 5. Save the PM2 list for reboot persistence
          pm2 save
